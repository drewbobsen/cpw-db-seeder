name: Generate and Release SQL Seed

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Seeder to Generate SQL
        run: cargo run --release

      # NEW: This will print the directory contents to the Action logs
      - name: Verify SQL File Generation
        run: |
          echo "Checking if data directory and seed.sql exist..."
          ls -lh data/

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          name: Database Seed ${{ github.ref_name }}
          # FIX: Removed the leading ./ so the glob matcher finds it perfectly
          files: data/seed.sql